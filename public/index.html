<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>HatakePlay</title>
    <link rel="stylesheet" href="/css/style.css">
    <script src="https://www.gstatic.com/firebasejs/10.0.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.0.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.0.0/firebase-database-compat.js"></script>
</head>
<body>
    <div id="landing-screen" class="screen active-screen">
        <div class="center-box">
            <h1>HatakePlay</h1>
            <input type="email" id="auth-email" placeholder="Email Address">
            <input type="password" id="auth-password" placeholder="Password">
            <button onclick="loginEmail()">Login</button>
            <button onclick="registerEmail()">Register</button>
        </div>
    </div>

    <div id="dashboard-screen" class="screen">
        <h2>Welcome, <span id="user-display-name"></span></h2>
        <div class="dashboard-container">
            <div class="dashboard-panel">
                <h3>My Inventory</h3>
                <button onclick="openDeckBuilder()">+ Create New Deck</button>
                <div id="user-decks-list"></div>
            </div>
            <div class="dashboard-panel">
                <h3>Game Matchmaking</h3>
                <select id="lobby-format"><option>STANDARD</option><option>MODERN</option></select>
                <select id="lobby-max-players"><option value="1">1 Player</option><option value="2">2 Players</option></select>
                <button onclick="createLobby()">Create Lobby</button>
                <div id="lobbies-list"></div>
            </div>
        </div>
    </div>
    
    <div id="deck-builder-screen" class="screen">
        <div class="center-box">
            <h2 id="deck-builder-title">Deck Builder</h2>
            <input type="text" id="new-deck-name" placeholder="Deck Name">
            <textarea id="new-deck-list" placeholder="4 Lightning Bolt&#10;Sideboard&#10;2 Blood Moon"></textarea>
            <button onclick="saveDeck()">Save Deck</button>
            <button onclick="showScreen('dashboard-screen')">Cancel</button>
        </div>
    </div>

    <div id="game-lobby-screen" class="screen">
        <div class="center-box">
            <h2>Lobby</h2>
            <div id="lobby-players-list"></div>
            <button id="ready-btn" onclick="toggleReadyStrict()">Ready Up</button>
        </div>
    </div>

    <div id="context-menu" class="context-menu">
        <div class="menu-item" onclick="contextAction('flip')">Flip Card</div>
        <div class="menu-item" onclick="contextAction('add-counter')">+1 Counter</div>
        <div class="menu-item" onclick="contextAction('sub-counter')">-1 Counter</div>
        <div class="menu-item" onclick="contextAction('hand')">Move to Hand</div>
        <div class="menu-item" onclick="contextAction('deck')">To Top of Library</div>
        <div class="menu-item" onclick="contextAction('bottom')">To Bottom of Library</div>
        <div class="menu-item" onclick="contextAction('grave')">To Graveyard</div>
        <div class="menu-item" onclick="contextAction('exile')">To Exile</div>
    </div>

    <div id="playmat" class="screen">
        <div id="spawn-modal" class="center-box" style="display:none; position:absolute; z-index:12000;">
            <h3>Select Deck</h3>
            <select id="playmat-deck-select"></select>
            <button onclick="importSavedDeck()">Spawn Deck</button>
        </div>

        <button onclick="toggleTools()" class="tools-btn">⚙️ Tools</button>
        <div id="tools-panel" class="tools-panel">
            <button onclick="rollD20()">Roll D20</button>
            <hr>
            <input type="text" id="token-name" placeholder="Token Name">
            <input type="text" id="token-oracle" placeholder="Oracle Text">
            <input type="text" id="token-pt" placeholder="P/T (e.g. 1/1)">
            <button onclick="spawnToken()">Create Token</button>
        </div>

        <div id="hand-zone"></div>
        <div class="hand-scroll-area left" onmouseenter="startHandScroll(25)" onmouseleave="stopHandScroll()">❮</div>
        <div class="hand-scroll-area right" onmouseenter="startHandScroll(-25)" onmouseleave="stopHandScroll()">❯</div>

        <div id="my-deck-zone" class="zone" ondblclick="drawCard()" oncontextmenu="drawCard(); return false;">
            Library <div id="deck-counter" class="deck-counter">0</div>
        </div>
        <div id="my-exile-zone" class="zone">Exile</div>
        <div id="my-grave-zone" class="zone">Grave</div>

        <div id="my-life" class="life-tracker"><span id="my-life-total">20</span><div><button onclick="updateLife(-1)">-</button><button onclick="updateLife(1)">+</button></div></div>
        <div id="opp-life" class="life-tracker" style="display:none;"><span id="opp-life-total">20</span></div>

        <div id="card-layer" style="position: absolute; top: 0; left: 0; width: 100vw; height: 100vh; z-index: 10;"></div>
        
        <button onclick="untapAll()" id="btn-untap" title="Untap All">⟲</button>
        
        <div id="game-start-controls">
            <button id="btn-draw-hand" onclick="handleDrawHandClick()">Draw Opening Hand (7)</button>
            <div id="mulligan-controls">
                <button onclick="takeMulligan()" style="background:#e67e22;">Mulligan</button>
                <button id="btn-keep-hand" onclick="keepHand()" style="background:#2ecc71;">Keep Hand</button>
                <button id="btn-confirm-bottom" onclick="confirmBottom()" style="display:none; background:#3498db;">Confirm Bottom</button>
            </div>
            <div id="mulligan-instructions"></div>
        </div>
    </div>

    <script src="/js/app.js"></script>
    <script src="/js/game.js"></script>
</body>
</html>
